document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:11px 8px; font-family:monospace; font-size:12.5px; color:#D5DFDA\">{{ g.code }}<\u002Fdiv>\n              <div style=\"padding:11px 8px; font-weight:600; color:#FBF8F4\">{{ g.name }}<\u002Fdiv>\n              <div style=\"padding:11px 8px; color:#D5DFDA\">{{ g.att }}<\u002Fdiv>\n              <div style=\"padding:11px 8px; color:#D5DFDA\" title=\"Auto-graded quiz average · Điểm quiz chấm tự động\">{{ g.quizAvg }}<\u002Fdiv>\n              <div style=\"padding:11px 8px\"><input type=\"number\" min=\"0\" max=\"10\" step=\"0.5\" value=\"{{ g.mid }}\" onchange=\"{{ g.setMid }}\" title=\"Giữa kỳ · Midterm\" style=\"width:48px; border:1px solid rgba(168,136,78,0.5); border-radius:6px; background:#102B2A; color:#FBF8F4; padding:4px; font-size:13px; font-family:'Source Sans 3',sans-serif\"><\u002Fdiv>\n              <div style=\"padding:11px 8px\"><input type=\"number\" min=\"0\" max=\"10\" step=\"0.5\" value=\"{{ g.skill }}\" onchange=\"{{ g.setSkill }}\" title=\"Kỹ năng · Skills fit\" style=\"width:48px; border:1px solid rgba(168,136,78,0.5); border-radius:6px; background:#102B2A; color:#FBF8F4; padding:4px; font-size:13px; font-family:'Source Sans 3',sans-serif\"><\u002Fdiv>\n              <div style=\"padding:11px 8px; color:#D5DFDA; font-weight:600\">{{ g.cw }}<\u002Fdiv>\n              <div style=\"padding:11px 8px; display:flex; align-items:center; gap:6px\">\n                <input type=\"number\" min=\"0\" max=\"10\" step=\"0.1\" value=\"{{ g.capstone }}\" onchange=\"{{ g.setCapstone }}\" title=\"Report score (50%) · Điểm báo cáo\" style=\"width:44px; border:1px solid rgba(168,136,78,0.5); border-radius:6px; background:#102B2A; color:#FBF8F4; padding:4px; font-size:13px; font-family:'Source Sans 3',sans-serif\">\n                <input type=\"number\" min=\"0\" max=\"10\" step=\"0.1\" value=\"{{ g.written }}\" onchange=\"{{ g.setWritten }}\" title=\"Exam score (50%) · Bài thi (12 câu, chọn 3)\" style=\"width:44px; border:1px solid rgba(168,136,78,0.5); border-radius:6px; background:#102B2A; color:#FBF8F4; padding:4px; font-size:13px; font-family:'Source Sans 3',sans-serif\">\n                <span style=\"color:{{ g.finColor }}; font-weight:600\">{{ g.fin }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"padding:11px 8px\"><input type=\"number\" min=\"-10\" max=\"10\" step=\"0.1\" value=\"{{ g.adjVal }}\" onchange=\"{{ g.setAdj }}\" title=\"{{ g.adjTitle }}\" style=\"width:46px; border:1px solid {{ g.adjColor }}; border-radius:6px; background:#102B2A; color:#FBF8F4; padding:4px; font-size:13px; font-family:'Source Sans 3',sans-serif\"><\u002Fdiv>\n              <div style=\"padding:11px 8px; font-family:'Cormorant Garamond',serif; font-size:21px; font-weight:600; color:{{ g.totalColor }}\">{{ g.total }}<\u002Fdiv>\n              <div style=\"padding:11px 8px; font-weight:600; color:{{ g.totalColor }}\">{{ g.letter }}<\u002Fdiv>\n              <div style=\"padding:11px 8px; font-size:12px; color:{{ g.noteColor }}\">{{ g.note }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"font-size:12px; color:#96A8A1; margin-top:12px\">Rounding half-up, 1 decimal · Làm tròn nửa lên, 1 chữ số. Cấm thi (absence &gt; {{ maxAbsPct }}) forces final = 0 unless an admin override is logged. Cột <b style=\"color:#C9A24A\">Phúc tra ±<\u002Fb>: điều chỉnh thủ công điểm cuối kỳ khi phúc tra / nâng / hạ điểm — bắt buộc nhập lý do, hiện ở Ghi chú và file xuất. Export uses UTF-8 BOM · Xuất file giữ đúng dấu tiếng Việt.<\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ================= ASSESSMENTS ================= -->\n      <sc-if value=\"{{ isAssessments }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"font-size:13.5px; color:#D5DFDA; margin-bottom:18px\">Quiz bank per lesson — MCQs auto-graded on submission; results flow straight into the gradebook (Quiz TB). · Ngân hàng câu hỏi theo bài học — trắc nghiệm chấm tự động, điểm đổ thẳng vào bảng điểm.<\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:22px; border:1px solid #A8884E; border-radius:10px; background:#042726; padding:16px 20px\">\n          <div style=\"flex:1; min-width:240px\">\n            <div style=\"font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:#C9A24A; margin-bottom:6px\">Exam template · Mẫu đề thi<\u002Fdiv>\n            <div style=\"font-size:12.5px; color:#D5DFDA; line-height:1.6\">Download the template, fill in your questions (Bài học 1–14 · Câu hỏi · Đáp án A–D · Đáp án đúng), upload it back — the system auto-grades against the new answer key. · Tải mẫu, điền câu hỏi và đáp án đúng, tải lên — hệ thống chấm tự động theo đề mới.<\u002Fdiv>\n            <sc-if value=\"{{ customBank }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font-size:12px; color:#7FB595; font-weight:600; margin-top:6px\">● Custom question bank active · Đang dùng đề tải lên<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:8px; min-width:220px\">\n            <button onclick=\"{{ downloadQuizTemplate }}\" style=\"background:#A8884E; color:#042726; border:none; border-radius:8px; padding:10px 16px; font-size:11.5px; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; font-family:'Source Sans 3',sans-serif; font-weight:600\" style-hover=\"background:#FBF8F4\">Download template · Tải mẫu đề<\u002Fbutton>\n            <input type=\"file\" accept=\".csv,.xlsx,.txt\" onchange=\"{{ onQuizUpload }}\" style=\"font-size:12px; color:#D5DFDA; font-family:'Source Sans 3',sans-serif; max-width:240px\">\n            <sc-if value=\"{{ customBank }}\" hint-placeholder-val=\"{{ false }}\">\n              <button onclick=\"{{ resetQuizBank }}\" style=\"background:transparent; color:#96A8A1; border:1px solid rgba(168,136,78,0.5); border-radius:8px; padding:7px 12px; font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; font-family:'Source Sans 3',sans-serif\" style-hover=\"color:#C9A24A; border:1px solid #C9A24A\">Restore default bank · Khôi phục đề mặc định<\u002Fbutton>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:6px; flex-wrap:wrap; margin-bottom:22px\">\n          <sc-for list=\"{{ lessonTabs }}\" as=\"lt\" hint-placeholder-count=\"14\">\n            <div onclick=\"{{ lt.go }}\" title=\"{{ lt.title }}\" style=\"width:38px; height:38px; display:flex; align-items:center; justify-content:center; font-size:13px; cursor:pointer; border:1px solid {{ lt.border }}; border-radius:8px; background:{{ lt.bg }}; color:{{ lt.color }}; font-weight:600\" style-hover=\"border:1px solid #C9A24A\">{{ lt.no }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div data-m=\"grid2\" style=\"display:grid; grid-template-columns:1.4fr 1fr; gap:28px; align-items:start\">\n          <div>\n            <div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px; gap:16px\">\n              <div style=\"font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:600; color:#FBF8F4\">{{ lessonTitle }}<\u002Fdiv>\n              <div style=\"font-size:12.5px; color:#96A8A1; flex-shrink:0\">Class average · Điểm TB lớp: <b style=\"color:#C9A24A; font-size:15px\">{{ lessonAvg }}<\u002Fb><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:18px\">\n              <sc-for list=\"{{ quizQuestions }}\" as=\"qq\" hint-placeholder-count=\"2\">\n                <div style=\"border:1px solid rgba(168,136,78,0.5); border-radius:10px; background:#042726; padding:22px 24px\">\n                  <div style=\"display:flex; gap:12px; align-items:baseline; margin-bottom:14px\">\n                    <span style=\"font-family:monospace; font-size:12px; color:#C9A24A\">{{ qq.no }}<\u002Fspan>\n                    <span style=\"font-size:15px; font-weight:600; color:#FBF8F4; line-height:1.5\">{{ qq.prompt }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"display:flex; flex-direction:column; gap:8px\">\n                    <sc-for list=\"{{ qq.options }}\" as=\"op\" hint-placeholder-count=\"4\">\n                      <div style=\"display:flex; gap:12px; align-items:baseline; padding:9px 14px; border:1px solid {{ op.border }}; border-radius:8px; background:{{ op.bg }}\">\n                        <span style=\"font-family:monospace; font-size:12px; color:#96A8A1\">{{ op.letter }}<\u002Fspan>\n                        <span style=\"flex:1; font-size:13.5px; color:{{ op.color }}; line-height:1.5\">{{ op.text }}<\u002Fspan>\n                        <span style=\"font-size:11px; letter-spacing:0.06em; color:#C9A24A; font-weight:600; flex-shrink:0\">{{ op.mark }}<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <div style=\"font-size:12px; color:#96A8A1\">MCQ · one attempt · timed · question shuffle on delivery. Short-answer items go to the manual grading queue. · Trắc nghiệm một lượt làm, trộn câu hỏi; câu tự luận vào hàng chờ chấm tay.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border:1px solid rgba(168,136,78,0.5); border-radius:10px; background:#042726; padding:24px 26px\">\n            <div style=\"font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:#C9A24A; margin-bottom:16px\">Auto-graded results · Kết quả chấm tự động<\u002Fdiv>\n            <sc-for list=\"{{ lessonScores }}\" as=\"ls\" hint-placeholder-count=\"12\">\n              <div style=\"display:flex; justify-content:space-between; align-items:baseline; padding:8px 0; border-bottom:1px solid rgba(168,136,78,0.22)\">\n                <div><span style=\"font-size:13.5px; font-weight:600; color:#FBF8F4\"> 22em; text-transform:uppercase; color:#C9A24A; margin-bottom:12px\">2 · Upload class list · Tải danh sách lên<\u002Fdiv>\n              <div style=\"font-size:12.5px; color:#D5DFDA; line-height:1.6; margin-bottom:14px\">Fill in your students and upload the file (.csv or .xlsx). The roster, attendance, gradebook and portal all switch to the new class. · Điền tên sinh viên rồi tải lên — toàn bộ điểm danh &amp; bảng điểm chuyển sang lớp mới.<\u002Fdiv>\n              <input type=\"file\" accept=\".csv,.xlsx,.txt\" onchange=\"{{ onUpload }}\" style=\"width:100%; font-size:12.5px; color:#D5DFDA; font-family:'Source Sans 3',sans-serif\">\n            <\u002Fdiv>\n            <div style=\"border:1px solid rgba(168,136,78,0.4); border-radius:10px; padding:18px 24px\">\n              <div style=\"font-size:12px; color:#96A8A1; line-height:1.6; margin-bottom:10px\">Uploaded class is saved in this browser. · Danh sách tải lên được lưu tại trình duyệt này.<\u002Fdiv>\n              <button onclick=\"{{ resetDemo }}\" style=\"background:transparent; color:#96A8A1; border:1px solid rgba(168,136,78,0.5); border-radius:8px; padding:8px 14px; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; font-family:'Source Sans 3',sans-serif\" style-hover=\"color:#C9A24A; border:1px solid #C9A24A\">Restore demo class · Khôi phục lớp demo<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ================= STUDENT PORTAL ================= -->\n      <sc-if value=\"{{ isPortal }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex; align-items:center; gap:14px; margin-bottom:26px\">\n          <span style=\"font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:#96A8A1\">Viewing as student · Xem với vai trò sinh viên<\u002Fspan>\n          <select value=\"{{ portalIdx }}\" onchange=\"{{ setPortalIdx }}\" style=\"border:1px solid rgba(168,136,78,0.5); border-radius:8px; background:#042726; color:#FBF8F4; padding:9px 12px; font-size:14px; font-family:'Source Sans 3',sans-serif\">\n            <sc-for list=\"{{ studentOptions }}\" as=\"o\" hint-placeholder-count=\"12\">\n              <option value=\"{{ o.value }}\">{{ o.label }}<\u002Foption>\n            <\u002Fsc-for>\n          <\u002Fselect>\n        <\u002Fdiv>\n\n        <div data-m=\"grid2\" style=\"display:grid; grid-template-columns:1fr 1fr; gap:28px; align-items:start\">\n          <div style=\"display:flex; flex-direction:column; gap:28px\">\n            <div style=\"border:1px solid rgba(168,136,78,0.5); border-radius:10px; background:#042726; padding:26px 28px\">\n              <div style=\"font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:#C9A24A; margin-bottom:18px\">My attendance timeline · Chuyên cần của tôi<\u002Fdiv>\n              <div style=\"display:flex; gap:5px; flex-wrap:wrap\">\n                <sc-for list=\"{{ pTimeline }}\" as=\"t\" hint-placeholder-count=\"15\">\n                  <div title=\"{{ t.title }}\" style=\"width:34px; height:34px; display:flex; align-items:center; justify-content:center; font-size:11.5px; font-weight:600; border-radius:6px; background:{{ t.bg }}; color:{{ t.color }}\">{{ t.no }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"margin-top:16px; font-size:13.5px; color:#D5DFDA\">Absence rate · Tỷ lệ vắng <b style=\"color:{{ pAbsColor }}\">{{ pAbsPct }}<\u002Fb> of {{ pMaxAbsNote }}<\u002Fdiv>\n              <sc-if value=\"{{ pBarred }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"margin-top:12px; background:#C96F62; color:#042726; border-radius:8px; padding:12px 16px; font-size:13px; font-weight:600\">You are barred from the final exam (cấm thi). · Bạn đã bị cấm thi cuối kỳ — liên hệ giảng viên để xét vắng có phép.<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"border:1px solid rgba(168,136,78,0.5); border-radius:10px; background:#042726; padding:26px 28px\">\n              <div style=\"font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:#C9A24A; margin-bottom:18px\">My scores · Điểm của tôi<\u002Fdiv>\n              <sc-for list=\"{{ pScores }}\" as=\"ps\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex; justify-content:space-between; align-items:baseline; padding:10px 0; border-bottom:1px solid rgba(168,136,78,0.25)\">\n                  <div><span style=\"font-size:14.5px; font-weight:600; color:#FBF8F4\">{{ ps.label }}<\u002Fspan> <span style=\"font-size:12px; color:#96A8A1\">{{ ps.vi }}<\u002Fspan><\u002Fdiv>\n                  <span style=\"font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:600; color:{{ ps.color }}\">{{ ps.value }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:#042726; border:1px solid #A8884E; border-radius:10px; color:#FBF8F4; padding:30px 32px\">\n            <div style=\"font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:#C9A24A; margin-bottom:8px\">Projected final grade · Điểm dự kiến<\u002Fdiv>\n            <div style=\"font-family:'Cormorant Garamond',serif; font-size:74px; font-weight:500; color:#C9A24A; line-height:1\">{{ pTotal }}<\u002Fdiv>\n            <div style=\"font-size:13.5px; color:#96A8A1; margin-top:6px\">{{ pStatus }}<\u002Fdiv>\n            <div style=\"border-top:1px solid rgba(168,136,78,0.4); margin:26px 0 22px\"><\u002Fdiv>\n            <div style=\"font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:#C9A24A; margin-bottom:14px\">What-if calculator · Máy tính giả định<\u002Fdiv>\n            <div style=\"font-size:14px; line-height:1.7; color:#D5DFDA\">To finish with at least · Để đạt tối thiểu\n              <input type=\"number\" min=\"0\" max=\"10\" step=\"0.5\" value=\"{{ whatIfTarget }}\" onchange=\"{{ setWhatIfTarget }}\" style=\"width:56px; background:#102B2A; border:1px solid #A8884E; border-radius:6px; color:#C9A24A; padding:5px 6px; font-size:15px; font-weight:600; font-family:'Source Sans 3',sans-serif; text-align:center; margin:0 4px\">\n              overall, you need · bạn cần\n              <span style=\"font-family:'Cormorant Garamond',serif; font-size:26px; color:#C9A24A; font-weight:600; margin:0 4px\">{{ whatIfNeeded }}<\u002Fspan>\n              on the final assessment · ở bài cuối kỳ.\n            <\u002Fdiv>\n            <div style=\"font-size:12.5px; color:#96A8A1; margin-top:14px\">{{ whatIfNote }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ================= LEADS ================= -->\n      <sc-if value=\"{{ isLeads }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"font-size:13.5px; color:#D5DFDA; margin-bottom:18px\">Enrollment applications from the landing page. Approve to convert a lead into an enrolled student. · Hồ sơ đăng ký từ trang giới thiệu — duyệt để chuyển thành sinh viên chính thức.<\u002Fdiv>\n        <div style=\"border:1px solid rgba(168,136,78,0.5); border-radius:10px; background:#042726; overflow:hidden\">\n          <sc-for list=\"{{ leadRows }}\" as=\"ld\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex; align-items:center; flex-wrap:wrap; gap:12px 18px; padding:14px 20px; border-bottom:1px solid rgba(168,136,78,0.22)\">\n              <div style=\"flex:1; min-width:220px\">\n                <div style=\"display:flex; align-items:baseline; gap:8px; flex-wrap:wrap\">\n                  <span style=\"font-weight:600; font-size:14.5px; color:#FBF8F4\">{{ ld.name }}<\u002Fspan>\n                  <span style=\"font-family:monospace; font-size:12px; color:#96A8A1\">{{ ld.code }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:12.5px; color:#96A8A1; margin-top:2px\">{{ ld.contact }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:12px; color:#96A8A1\">{{ ld.cohort }}<\u002Fdiv>\n              <div style=\"font-size:11px; letter-spacing:0.1em; text-transform:uppercase; padding:4px 10px; border-radius:6px; background:{{ ld.statusBg }}; color:{{ ld.statusColor }}; font-weight:600\">{{ ld.status }}<\u002Fdiv>\n              <sc-if value=\"{{ ld.pending }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"display:flex; gap:8px\">\n                  <button onclick=\"{{ ld.approve }}\" style=\"background:#A8884E; color:#042726; border:none; border-radius:6px; padding:7px 14px; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; font-family:'Source Sans 3',sans-serif; font-weight:600\" style-hover=\"background:#FBF8F4\">Approve · Duyệt<\u002Fbutton>\n                  <button onclick=\"{{ ld.reject }}\" style=\"background:transparent; color:#C96F62; border:1px solid #C96F62; border-radius:6px; padding:7px 14px; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; font-family:'Source Sans 3',sans-serif\" style-hover=\"background:#C96F62; color:#042726\">Reject · Từ chối<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"font-size:12px; color:#96A8A1; margin-top:12px\">New applications submitted on the landing page appear here automatically. · Đơn mới từ trang giới thiệu sẽ tự động xuất hiện tại đây.<\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ================= SETTINGS ================= -->\n      <sc-if value=\"{{ isSettings }}\" hint-placeholder-val=\"{{ false }}\">\n        <div data-m=\"grid2\" style=\"display:grid; grid-template-columns:1fr 1fr; gap:28px; align-items:start; max-width:960px\">\n          <div style=\"border:1px solid rgba(168,136,78,0.5); border-radius:10px; background:#042726; padding:26px 28px\">\n            <div style=\"font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:#C9A24A; margin-bottom:6px\">Grade weights · Trọng số điểm<\u002Fdiv>\n            <div style=\"font-size:12.5px; color:#96A8A1; margin-bottom:20px\">Must sum to 1.0 — recomputes all grades and the landing-page diagram. · Tổng phải bằng 1.0.<\u002Fdiv>\n            <sc-for list=\"{{ weightInputs }}\" as=\"w\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid rgba(168,136,78,0.25)\">\n                <div><span style=\"font-weight:600; font-size:14px; color:#FBF8F4\">{{ w.label }}<\u002Fspan> <span style=\"font-size:12px; color:#96A8A1\">{{ w.vi }}<\u002Fspan><\u002Fdiv>\n                <input type=\"number\" min=\"0\" max=\"1\" step=\"0.05\" value=\"{{ w.value }}\" onchange=\"{{ w.set }}\" style=\"width:70px; border:1px solid rgba(168,136,78,0.5); border-radius:6px; background:#102B2A; color:#FBF8F4; padding:7px 8px; font-size:14px; font-family:'Source Sans 3',sans-serif; text-align:center\">\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <div style=\"margin-top:16px; font-size:13px; font-weight:600; color:{{ weightSumColor }}\">{{ weightSumMsg }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border:1px solid rgba(168,136,78,0.5); border-radius:10px; background:#042726; padding:26px 28px\">\n            <div style=\"font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:#C9A24A; margin-bottom:20px\">Policy · Quy định<\u002Fdiv>\n            <sc-for list=\"{{ policyInputs }}\" as=\"p\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid rgba(168,136,78,0.25)\">\n                <div><span style=\"font-weight:600; font-size:14px; color:#FBF8F4\">{{ p.label }}<\u002Fspan><div style=\"font-size:12px; color:#96A8A1\">{{ p.sub }}<\u002Fdiv><\u002Fdiv>\n                <input type=\"number\" min=\"0\" max=\"{{ p.max }}\" step=\"{{ p.step }}\" value=\"{{ p.value }}\" onchange=\"{{ p.set }}\" style=\"width:70px; border:1px solid rgba(168,136,78,0.5); border-radius:6px; background:#102B2A; color:#FBF8F4; padding:7px 8px; font-size:14px; font-family:'Source Sans 3',sans-serif; text-align:center\">\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <div style=\"margin-top:18px; font-size:12.5px; color:#96A8A1; line-height:1.6\">Overrides (e.g. lifting a cấm thi flag) are admin-only and logged with old value, new value, reason, actor, and timestamp. · Mọi điều chỉnh tay đều được ghi log đầy đủ.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 1440, &quot;height&quot;: 900}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    // Official class list — LỚP F-NU-10 · KHÓA 10 / INTAKE 10 · Năm học 2025–2026\n    const STUDENTS = [\n      ['2505013002','Đặng Quỳnh Anh','14/12/2007'],\n      ['2505013006','Trần Phạm Anh Duy','13/07/2007'],\n      ['2505013008','Trần Ngân Giang','11/02/2005'],\n      ['2505013010','Nguyễn Thu Hương','22/09/2007'],\n      ['2505013012','Nguyễn Tuấn Kiệt','06/09/2007'],\n      ['2505013013','Nguyễn Tùng Lâm','27/11/2007'],\n      ['2505013014','Nguyễn Hương Linh','13/04/2007'],\n      ['2505013015','Nguyễn Lê Ngọc Linh','09/11/2007'],\n      ['2505013016','Trịnh Mai Linh','09/07/2007'],\n      ['2505013020','Lê Hải Long','24/07/2007'],\n      ['2505013022','Nguyễn Hoàng Minh','19/12/2007'],\n      ['2505013025','Vũ Ngọc Quỳnh','20/03/2007'],\n      ['2505013026','Phạm Trần Hải Sơn','01/08/2007'],\n      ['2505013029','Mai Thanh Tú','14/12/2007'],\n      ['2505013033','Phan Quang Tuấn','29/01/2008'],\n      ['2505013035','Nguyễn Bảo Ngân','18/07/2007'],\n      ['2505013034','Bùi Đức Mạnh','20/01/2005'],\n      ['2405004029','Nguyễn Đăng Khoa','10/06/2006']\n    ];\n    let students = STUDENTS.map((s) => ({\n      code: s[0], name: s[1], dob: s[2], note: '',\n      att: Array(15).fill('P'),\n      quiz: Array(14).fill(0),\n      mid: 0, skill: 0, fin: [0, 0],\n      adj: 0, adjReason: ''\n    }));\n    try {\n      const saved = JSON.parse(localStorage.getItem('fca_students') || 'null');\n      // only restore saved records that belong to this official K10 roster\n      if (Array.isArray(saved) && saved.length && saved[0].att && String(saved[0].code) === '2505013002') students = saved;\n    } catch (e) {}\n    // Quiz bank — 2 auto-graded MCQs per lesson, content from the official handouts\n    this.QUIZBANK = [\n      ['Introduction to the Course — Hospitality & Gastronomy', [\n        ['Gastronomy derives from the Greek gastér and nomos, meaning…', ['Taste and pleasure','Stomach and law','Food and art','Kitchen and rule'], 1],\n        ['The relationship between hospitality and gastronomy is best described as…', ['Parallel — neither exists without the other','Hospitality contains gastronomy','Independent disciplines','Gastronomy replaced hospitality'], 0]\n      ]],\n      ['Outline to Food Culture', [\n        ['Food works symbolically as a…', ['Survival mechanism only','Economic commodity only','Communicative practice','Neutral biological need'], 2],\n        ['Which religion observes fasting during Ramadan?', ['Hinduism','Islam','Judaism','Buddhism'], 1]\n      ]],\n      ['The World’s Food Districts', [\n        ['“Glocalization” means…', ['Adapting a global cuisine to local tastes','Exporting food unchanged','Banning foreign cuisine','Cooking only local produce'], 0],\n        ['The survey’s central analytical question is…', ['Which cuisine is best?','How to cook French food?','Why is fusion wrong?','What happens when a cuisine leaves home?'], 3]\n      ]],\n      ['What Shapes Food Culture', [\n        ['Hunger drives us to eat, but what we eat is decided by…', ['Genetics only','Multiple determinants: biological, economic, social, psychological','Price only','Advertising only'], 1],\n        ['Delivery apps and algorithmic feeds are best understood as…', ['A brand-new determinant','Irrelevant to food choice','A new medium for classic determinants','Purely logistics'], 2]\n      ]],\n      ['Food as a Portal into Culture', [\n        ['Traditional cuisine passed between generations operates as…', ['An expression of cultural identity','A fixed recipe set','A tourism product only','A dietary guideline'], 0],\n        ['Why do immigrants keep cooking the food of home?', ['Ingredients are cheaper','Cooking becomes an act of cultural preservation','Law requires it','Restaurants demand it'], 1]\n      ]],\n      ['Forming Food Culture', [\n        ['The historical sugar trade shows that…', ['Sugar was always cheap','Trade never affects culture','A single taste can reshape economies and populations','Taste is fixed by biology'], 2],\n        ['Chinese hot/cool theory is an example of…', ['A cooking temperature rule','A cuisine’s philosophy shaping its taste','A modern diet fad','A religious ban'], 1]\n      ]],\n      ['Trends & the New Food Culture', [\n        ['A fad differs from a trend because…', ['It fades before wide adoption in the diffusion lifecycle','It lasts decades','It is always healthy','It starts in fine dining'], 0],\n        ['The four lenses used to test any trend are…', ['Price, taste, size, speed','Local, global, urban, rural','Sweet, sour, salty, bitter','Cultural, aesthetic, business, ethical'], 3]\n      ]],\n      ['French Food Culture', [\n        ['French cuisine is called the “reference grammar” of Western gastronomy because…', ['It is the oldest cuisine','Its techniques, vocabulary and ranking systems became the standard','It uses the most butter','Michelin is French-owned'], 1],\n        ['The Michelin Green Star is retiring because…', ice','It is the only producer','It is state-owned','It is untaxed'], 0]\n      ]],\n      ['American Food Culture', [\n        ['American cuisine is best understood as…', ['A fixed indigenous menu','A process of borrowing, fusing and reinventing','Purely fast food','British cooking abroad'], 1],\n        ['GLP-1 (“Ozempic”) drugs matter to F&B because…', ['They ban restaurants','They only affect desserts','About 1 in 8 US adults use one, changing appetite and portions','They are food additives'], 2]\n      ]]\n    ];\n    let leads = [];\n    try { leads = JSON.parse(localStorage.getItem('fca_leads') || '[]'); } catch (e) {}\n    if (!leads.length) {\n      leads = [\n        { id: 'L1', name: 'Phan Gia Khang', student_code: 'SV240301', email: 'khang.pg@student.edu.vn', phone: '090 331 2210', cohort_pref: 'FCA-2026-Fall', status: 'pending_review' },\n        { id: 'L2', name: 'Trịnh Mai Chi', student_code: 'SV240315', email: 'chi.tm@student.edu.vn', phone: '093 884 0021', cohort_pref: 'FCA-2026-Fall', status: 'pending_review' },\n        { id: 'L3', name: 'Cao Nhật Long', student_code: 'SV240322', email: 'long.cn@student.edu.vn', phone: '097 210 4456', cohort_pref: 'FCA-2027-Spring', status: 'approved' }\n      ];\n    }\n    this.state = {\n      view: 'dashboard',\n      students, leads,\n      lesson: 0,\n      session: 14,\n      portalIdx: 3,\n      whatIfTarget: 8.0,\n      weights: { att: 0.10, cw: 0.30, fin: 0.60 },\n      lateCredit: 0.5, maxAbsRate: 0.20, passThreshold: 4.0,\n      qrToken: this.makeToken(), qrCountdown: 45,\n      quizbank: null,\n      toast: ''\n    };\n    try {\n      const qb = JSON.parse(localStorage.getItem('fca_quizbank') || 'null');\n      if (Array.isArray(qb) && qb.length === 14) this.state.quizbank = qb;\n    } catch (e) {}\n  }\n\n  makeToken() {\n    return Math.random().toString(36).slice(2, 8).toUpperCase();\n  }\n\n  componentDidMount() {\n    this.qrTimer = setInterval(() => {\n      const c = this.state.qrCountdown - 1;  file .csv hoặc .xlsx');\n      }\n      e.target.value = '';\n    };\n    const resetDemo = () => {\n      try { localStorage.removeItem('fca_students'); } catch (e) {}\n      this.showToast('Demo class restored · Đã khôi phục lớp demo');\n      setTimeout(() => location.reload(), 800);\n    };\n    const classRows = s.students.map((st, i) => ({\n      stt: i + 1, code: st.code, name: st.name,\n      dob: st.dob || '—', note: st.note || ''\n    }));\n    // ---- FNU9 official bilingual grade-sheet export (2025 format) ----\n    const exportFnu9 = () => {\n      const today = new Date();\n      const rows = [\n        ['TRƯỜNG ĐẠI HỌC NGOẠI THƯƠNG/FOREIGN TRADE UNIVERSITY','','','','','CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM/SOCIALIST REPUBLIC OF VIETNAM'],\n        ['KHOA ĐÀO TẠO QUỐC TẾ/FACULTY OF INTERNATIONAL EDUCATION','','','','','Độc lập - Tự do - Hạnh phúc/Independence - Freedom - Happiness'],\n        ['','','','','','Hà Nội, ngày/dd ' + today.getDate() + ' tháng/mm ' + (today.getMonth() + 1) + ' năm/yy ' + today.getFullYear()],\n        ['BẢNG ĐIỂM TỔNG HỢP ĐÁNH GIÁ HỌC PHẦN/ACADEMIC TRANSCRIPT'],\n        ['Môn thi/Module (Unit): Food Culture and Aesthetic'],\n        ['Lớp/Class: F-NU-10 · Khóa 10/Intake 10'],\n        ['Ngày thi/Exam date: …/…/2026'],\n        [],\n        ['STT/No.','MSV/Student\\'s ID','Họ và tên/Full name','Điểm CC/Attendance (' + pct(s.weights.att) + ')','Điểm GK/Assessment 1 (' + pct(s.weights.cw) + ')','Cuối kỳ/Assessment 2 (' + pct(s.weights.fin) + ')','Điểm học phần/Final Assessment - Bằng số/(in Number)','Bằng chữ/(in Words)','Ghi chú/Note']\n      ];\n      s.students.forEach((st, i) => {\n        const c = computed[i];\n        rows.push([i + 1, st.code, st.name, f1(c.att), f1(c.cw), f1(c.fin), f1(c.total), this.viWords(c.total), [c.barred ? 'Cấm thi' : (c.status === 'Fail' ? 'Không đạt' : ''), c.adj ? 'Điều chỉnh ' + (c.adj > 0 ? '+' : '') + c.adj + (st.adjReason ? ' (' + st.adjReason + ')' : '') : ''].filter(Boolean).join(' · ')]);\n      });\n      rows.push([]);\n      rows.push(['Giảng viên/Instructor: Expert Trương Quang Thành']);\n      dlCsv('F-NU-10_Bang-diem-tong-hop.csv', rows);\n      this.showToast('Official grade sheet exported · Đã xuất bảng điểm song ngữ (format 2025)');\n    };\n\n    const saveLeads = (leads) => {\n      this.setState({ leads });\n      try { localStorage.setItem('fca_leads', JSON.stringify(leads)); } catch (e) {}\n    };\n    const leadRows = s.leads.slice().reverse().map(ld => ({\n      name: ld.name, code: ld.student_code || '—',\n      contact: (ld.email || '') + (ld.phone ? ' · ' + ld.phone : ''),\n      cohort: ld.cohort_pref,\n      status: ld.status === 'pending_review' ? 'Pending · Chờ duyệt' : (ld.status === 'approved' ? 'Approved · Đã duyệt' : 'Rejected · Từ chối'),\n      statusBg: ld.status === 'pending_review' ? '#E2CD96' : (ld.status === 'approved' ? '#7FB595' : DANGER),\n      statusColor: '#042726',\n      pending: ld.status === 'pending_review',\n      approve: () => { saveLeads(s.leads.map(x => x.id === ld.id ? { ...x, status: 'approved' } : x)); this.showToast(ld.name + ' approved · đã duyệt — portal invitation sent'); },\n      reject: () => { saveLeads(s.leads.map(x => x.id === ld.id ? { ...x, status: 'rejected' } : x)); }\n    }));\n\n    const setWeight = (k) => (e) => this.setState({ weights: { ...s.weights, [k]: parseFloat(e.target.value) || 0 } });\n    const wSum = s.weights.att + s.weights.cw + s.weights.fin;\n    const wOk = Math.abs(wSum - 1) < 0.001;\n\n    return {\n      navItems,\n      viewTitle: TITLES[s.view],\n      heldLabel: '15 of 15 sessions held · ' + s.students.length + ' students — 15/15 buổi · ' + s.students.length + ' sinh viên',\n      isDashboard: s.view === 'dashboard', isAttendance: s.view === 'attendance',\n      isGradebook: s.view === 'gradebook', isAssessments: s.view === 'assessments', isStudents: s.view === 'students', isPortal: s.view === 'portal',\n      isLeads: s.view === 'leads', isSettings: s.view === 'settings',\n      toast: !!s.toast, toastMsg: s.toast,\n      cloneCohort: () => this.showToast('Cohort FCA-2027 created · Đã nhân bản khóa — curriculum copied, records reset'),\n\n      kpis: [\n        { label: 'Avg attendance · Chuyên cần TB', value: f1(avgAtt), sub: 'điểm chuyên cần / 10', color: WHITE },\n        { label: 'Avg course score · Tổng kết TB', value: f1(avgTotal), sub: 'điểm tổng kết / 10', color: GOLD },\n        { label: 'Barred · Cấm thi', value: String(barredCount), sub: 'absence > ' + pct(s.maxAbsRate) + ' · vắng quá mức', color: barredCount ? DANGER : WHITE },\n        { label: 'Failing · Không đạt', value: String(failCount), sub: 'below ' + f1(s.passThreshold) + ' or barred', color: failCount ? DANGER : WHITE }\n      ],\n      histogram: bins.map((b, i) => ({ label: b[0], count: binCounts[i], h: Math.max(4, binCounts[i] / maxBin * 100) + 'px' })),\n      atRisk: atRiskList,\n      queue: [\n        { title: 'Quiz 11 — short answers · tự luận ngắn', meta: '4 to grade' },\n        { title: 'Assignment 3 — case analysis · phân tích tình huống', meta: '2 to grade' },\n        { title: 'Capstone rubric — group C · nhóm C', meta: 'due Fri' }\n      ],\n\n      sessionTabs, sessionTitle: 'Session ' + (s.session + 1) + (s.session === 0 ? ' — Orientation · Định hướng' : ' — Lesson · Bài ' + s.session),\n      markAllPresent, roster, heatRows,\n      qrToken: s.qrToken, qrCountdown: s.qrCountdown,\n\n      wAttPct: pct(s.weights.att), wCwPct: pct(s.weights.cw), wFinPct: pct(s.weights.fin),\n      maxAbsPct: pct(s.maxAbsRate),\n      gradeRows, exportCsv, exportFnu9,\n      classRows, downloadTemplate, onUpload, resetDemo,\n      studentCount: s.students.length,\n\n      lessonTabs: BANK.map((q, i) => ({\n        no: i + 1, title: 'Lesson ' + (i + 1) + ' · ' + q[0],\n        bg: s.lesson === i ? BRASS : 'transparent',\n        color: s.lesson === i ? '#042726' : '#C7D2CC',\n        border: s.lesson === i ? BRASS : 'rgba(168,136,78,0.45)',\n        go: () => this.setState({ lesson: i })\n      })),\n      lessonTitle: 'Lesson ' + (s.lesson + 1) + ' — ' + BANK[s.lesson][0],\n      lessonAvg: f1(s.students.reduce((a, st) => a + st.quiz[s.lesson], 0) / s.students.length),\n      customBank: !!s.quizbank,\n      downloadQuizTemplate, onQuizUpload, resetQuizBank,\n      quizQuestions: BANK[s.lesson][1].map((qq, qi) => ({\n        no: 'Q' + (qi + 1),\n        prompt: qq[0],\n        options: qq[1].map((opt, oi) => ({\n          letter: String.fromCharCode(65 + oi),\n          text: opt,\n          correct: oi === qq[2],\n          bg: oi === qq[2] ? 'rgba(168,136,78,0.18)' : 'transparent',\n          border: oi === qq[2] ? BRASS : 'rgba(168,136,78,0.25)',\n          color: oi === qq[2] ? GOLD : '#D5DFDA',\n          mark: oi === qq[2] ? '✓ Correct answer · Đáp án đúng' : ''\n        }))\n      })),\n      lessonScores: s.students.map((st, i) => ({\n        name: st.name, code: st.code,\n        score: f1(st.quiz[s.lesson]),\n        color: st.quiz[s.lesson] >= 8 ? GOLD : (st.quiz[s.lesson] < 5 ? DANGER : WHITE)\n      })),\n\n      studentOptions: s.students.map((st, i) => ({ value: i, label: st.name + ' · ' + st.code })),\n      portalIdx: pi, setPortalIdx: (e) => this.setState({ portalIdx: parseInt(e.target.value, 10) }),\n      pTimeline: pst.att.map((a, j) => ({\n        no: j + 1, title: 'Session ' + (j + 1) + ' · ' + STATUS[a][0],\n        bg: STATUS[a][1], color: '#042726'\n      })),\n      pAbsPct: pct(pc.absRate), pAbsColor: pc.barred ? DANGER : WHITE,\n      pMaxAbsNote: pct(s.maxAbsRate) + ' allowed before cấm thi · mức cho phép',\n      pBarred: pc.barred,\n      pScores: [\n        { label: 'Attendance', vi: 'Chuyên cần · 10%', value: f1(pc.att), color: WHITE },\n        { label: 'Quiz average', vi: 'Quiz TB · auto-graded, 14 bài', value: f1(pc.quizAvg), color: WHITE },\n        { label: 'Midterm', vi: 'Giữa kỳ', value: f1(pst.mid), color: WHITE },\n        { label: 'Skills', vi: 'Kỹ năng', value: f1(pst.skill), color: WHITE },\n        { label: 'Coursework', vi: 'Quá trình · 30% = quiz 40% + giữa kỳ 40% + kỹ năng 20%', value: f1(pc.cw), color: WHITE },\n        { label: 'Final assessment', vi: 'Cuối kỳ · 60%', value: f1(pc.fin), color: pc.barred ? DANGER : WHITE },\n        { label: 'Letter grade', vi: 'Điểm chữ', value: pc.letter, color: pc.letter === 'F' ? DANGER : GOLD }\n      ],\n      pTotal: f1(pc.total),\n      pStatus: pc.barred ? 'Barred from exam · Cấm thi' : (pc.status === 'Fail' ? 'Fail · Không đạt — below ' + f1(s.passThreshold) : 'Passing · Đạt — ' + pc.letter),\n      whatIfTarget: s.whatIfTarget,\n      setWhatIfTarget: (e) => this.setState({ whatIfTarget: Math.max(0, Math.min(10, parseFloat(e.target.value) || 0)) }),\n      whatIfNeeded, whatIfNote,\n\n      leadRows,\n\n      weightInputs: [\n        { label: 'Attendance', vi: 'Điểm chuyên cần', value: s.weights.att, set: setWeight('att') },\n        { label: 'Coursework', vi: 'Điểm quá trình', value: s.weights.cw, set: setWeight('cw') },\n        { label: 'Final assessment', vi: 'Điểm cuối kỳ', value: s.weights.fin, set: setWeight('fin') }\n      ],\n      weightSumColor: wOk ? GOLD : DANGER,\n      weightSumMsg: wOk ? 'Σ = 1.00 — valid · hợp lệ' : 'Σ = ' + wSum.toFixed(2) + ' — weights must sum to 1.00 · tổng trọng số phải bằng 1.00',\n      policyInputs: [\n        { label: 'Late credit', sub: 'per-session credit for Late · điểm cho buổi đi trễ', value: s.lateCredit, max: 1, step: 0.1, set: (e) => this.setState({ lateCredit: Math.max(0, Math.min(1, parseFloat(e.target.value) || 0)) }) },\n        { label: 'Max absence rate', sub: 'above this → cấm thi · ngưỡng cấm thi', value: s.maxAbsRate, max: 1, step: 0.05, set: (e) => this.setState({ maxAbsRate: Math.max(0, Math.min(1, parseFloat(e.target.value) || 0)) }) },\n        { label: 'Pass threshold', sub: 'course score below this → Fail · điểm đạt tối thiểu', value: s.passThreshold, max: 10, step: 0.5, set: (e) => this.setState({ passThreshold: Math.max(0, Math.min(10, parseFloat(e.target.value) || 0)) }) }\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
